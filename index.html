<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSCat — JavaScript al navegador</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Mode embed: aplicat immediatament per evitar flash -->
<script>
  (function() {
    var p = new URLSearchParams(location.search);
    if (p.get('embed') === '1') document.body.classList.add('embed');
    if (p.get('theme') === 'light') document.body.classList.add('light');
  })();
</script>

<!-- ══════════════════════════════════════════════════════
     FILA 1 — Identitat i navegació
     ══════════════════════════════════════════════════════ -->
<header class="topbar">
  <div class="logo">
    <span class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="1.4em" height="1.4em" style="vertical-align:middle"><rect width="32" height="32" rx="3" fill="#F7DF1E"/><path d="M21.4 24.2c.6 1 1.4 1.7 2.8 1.7 1.2 0 2-.6 2-1.4 0-1-.8-1.4-2.1-1.9l-.7-.3c-2.1-.9-3.5-2-3.5-4.4 0-2.2 1.7-3.9 4.3-3.9 1.9 0 3.3.7 4.2 2.4l-2.3 1.5c-.5-.9-1-1.3-1.9-1.3-.9 0-1.5.6-1.5 1.3 0 .9.6 1.3 1.9 1.9l.7.3c2.5 1.1 3.9 2.1 3.9 4.5 0 2.7-2.1 4.1-4.9 4.1-2.8 0-4.6-1.3-5.4-3l2.5-1.5zM12.1 24.4c.5.8 1 1.5 2 1.5.9 0 1.5-.4 1.5-1.8v-9.4h2.9v9.5c0 2.9-1.7 4.3-4.3 4.3-2.3 0-3.6-1.2-4.3-2.6l2.2-1.5z" fill="#000"/></svg></span>
    <span>JSCat</span>
  </div>

  <nav class="topbar-nav">
    <a href="curs/capitol-1.html" class="topbar-nav-link">Capítols</a>
    <a href="curs/repte-1.html" class="topbar-nav-link">Reptes</a>
    <a href="index.html" class="topbar-nav-link active">Simulador</a>
  </nav>

  <div class="topbar-actions"></div>

  <button id="btn-theme"
          class="btn btn-theme"
          onclick="toggleTheme()"
          aria-label="Canvia el tema">
  </button>
</header>


<!-- ══════════════════════════════════════════════════════
     FILA 2 — Controls d'execució
     ══════════════════════════════════════════════════════ -->
<div class="toolbar">
  <button class="btn p" id="btn-run"   onclick="handleRunClick()" aria-label="Executa el programa">▶ Executa</button>
  <button class="btn"   id="btn-reset" onclick="resetConsole()"   aria-label="Neteja la consola">↺ Neteja</button>
  <div class="toolbar-spacer"></div>
  <input type="file" id="file-open-input" accept=".js,.txt" hidden>
  <button class="btn btn-file" id="btn-open" aria-label="Obre un fitxer .js">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2z"/><path d="M12 10v6"/><path d="m9 13 3-3 3 3"/></svg>
    <span class="btn-file-label">Obre</span>
  </button>
  <button class="btn btn-file" id="btn-save" aria-label="Desa com a fitxer .js">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span class="btn-file-label">Desa</span>
  </button>
</div>


<!-- ══════════════════════════════════════════════════════
     ZONA PRINCIPAL — Editor + Consola
     ══════════════════════════════════════════════════════ -->
<div class="main">

  <!-- Columna esquerra: editor de codi -->
  <div class="code-col">
    <div class="editor-wrap">
      <div id="line-numbers"></div>
      <div class="editor-inner">
        <div  id="line-bg"        aria-hidden="true"></div>
        <pre  id="code-highlight" aria-hidden="true"></pre>
        <textarea id="code-editor" spellcheck="false" wrap="off"
                  aria-label="Editor de codi JavaScript" aria-multiline="true"></textarea>
      </div>
      <div id="autocomplete" class="autocomplete-dropdown" role="listbox" aria-label="Autocompletat"></div>
    </div>
  </div>

  <!-- Columna dreta (mode consola): consola de sortida -->
  <div class="console-col">
    <div class="console-header">
      <span>⬤ Consola</span>
    </div>
    <div class="console-area" role="region" aria-label="Consola de sortida" aria-live="polite">
      <div id="console-output"></div>
    </div>
  </div>

  <!-- Columna dreta (mode DOM): pàgina viva + consola petita
       S'activa amb la classe .dom-mode al body (afegida des de main.js
       quan ?mode=dom és present). -->
  <div class="dom-col" aria-hidden="true">
    <div class="dom-header">
      <span>📺 Pàgina</span>
    </div>
    <div class="dom-area">
      <iframe id="dom-iframe"
              sandbox="allow-scripts"
              title="Pàgina en execució"
              srcdoc=""></iframe>
    </div>
    <div class="console-header dom-console-header">
      <span>⬤ Consola</span>
    </div>
    <div class="console-area dom-console-area" aria-live="polite">
      <div id="dom-console-output"></div>
    </div>
  </div>

</div>


<!-- ══════════════════════════════════════════════════════
     Scripts — Ordre de càrrega
     ══════════════════════════════════════════════════════ -->
<script src="js/constants.js"></script>
<script src="js/i18n.js"></script>
<script src="js/state.js"></script>
<script src="js/console.js"></script>
<script src="js/editor.js"></script>
<script src="js/jsrunner.js"></script>
<script src="js/domrunner.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
<script src="footer.js"></script>

</body>
</html>
